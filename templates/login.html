<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body>

<div class="admin-container">

    <form method="POST" action="/login" class="admin-form">

        <h2>Admin Login</h2>

        <input type="text"
        name="username"
        placeholder="Username"
        required>

        <input type="password"
        name="password"
        placeholder="Password"
        required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
